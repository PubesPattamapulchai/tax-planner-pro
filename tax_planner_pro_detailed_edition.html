<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Planner Pro - Detailed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-slate-800 text-center mb-2">Tax Planner Pro</h1>
        <p class="text-sm text-slate-500 text-center mb-8 italic no-print">คำนวณภาษีแม่นยำ แจกแจงรายละเอียดครบถ้วน</p>
        
        <div class="space-y-6">
            <!-- Section: Income -->
            <section>
                <h2 class="text-lg font-semibold text-blue-600 border-b border-blue-100 pb-2 mb-4">1. รายได้รวม</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium">เงินเดือนรวม (บาท)</label>
                        <input type="text" id="salary" value="0" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400" onblur="saveData(this); formatInput(this)">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Freelance (บาท)</label>
                        <input type="text" id="freelance" value="0" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400" onblur="saveData(this); formatInput(this)">
                    </div>
                </div>

                <!-- Stock Calculation -->
                <div class="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <label class="block text-sm font-semibold text-blue-800 mb-2">กำไรจากการขายหุ้น (USD)</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <input type="number" id="stockQty" placeholder="จำนวนหุ้น" class="p-2 border rounded" oninput="saveData(this); calcStock()">
                        <input type="number" id="stockBuy" placeholder="ต้นทุน/หุ้น" class="p-2 border rounded" oninput="saveData(this); calcStock()">
                        <input type="number" id="stockSell" placeholder="ราคาขาย/หุ้น" class="p-2 border rounded" oninput="saveData(this); calcStock()">
                        <input type="text" id="stockProfit" value="0" readonly class="p-2 border rounded bg-gray-100 text-gray-500 font-bold" placeholder="กำไร">
                    </div>
                </div>

                <!-- DIME / Dividend -->
                <div class="mt-4 p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                    <label class="block text-sm font-semibold text-emerald-800 mb-2">รายได้หุ้นสหรัฐฯ (DIME - USD)</label>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-xs text-emerald-700">ปันผล (Gross USD)</label>
                            <input type="number" id="divUSD" value="0" class="w-full mt-1 p-2 border rounded-lg" oninput="saveData(this); autoCalcTax()">
                        </div>
                        <div>
                            <label class="block text-xs text-emerald-700">ภาษี ณ ที่จ่าย (USD)</label>
                            <input type="number" id="taxPaidUSD" value="0" class="w-full mt-1 p-2 border rounded-lg" oninput="saveData(this)">
                        </div>
                        <div>
                            <label class="block text-xs text-emerald-700">อัตราแลกเปลี่ยน</label>
                            <input type="number" id="fxRate" value="36.5" class="w-full mt-1 p-2 border rounded-lg" oninput="saveData(this)">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Section: Deductions -->
            <section>
                <h2 class="text-lg font-semibold text-blue-600 border-b border-blue-100 pb-2 mb-4">2. ค่าลดหย่อน</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">PVD สะสม (%)</label><input type="number" id="pvd" value="0" class="w-full mt-1 p-2 border rounded-lg" oninput="saveData(this)"></div>
                    <div><label class="block text-sm font-medium">ประกันสังคม (บาท)</label><input type="text" id="sso" value="10,500" class="w-full mt-1 p-2 border rounded-lg" onblur="saveData(this); formatInput(this)"></div>
                    <div><label class="block text-sm font-medium">ดูแลบิดามารดา (บาท)</label><input type="text" id="parents" value="0" class="w-full mt-1 p-2 border rounded-lg" onblur="saveData(this); formatInput(this)"></div>
                    <div><label class="block text-sm font-medium">บุตร/อื่นๆ/ประกัน (บาท)</label><input type="text" id="others" value="0" class="w-full mt-1 p-2 border rounded-lg" onblur="saveData(this); formatInput(this)"></div>
                </div>
            </section>
        </div>

        <button onclick="calculate()" class="no-print w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95 text-lg">คำนวณและแสดงรายละเอียด</button>

        <!-- Result Area -->
        <div id="output" class="mt-8 p-6 bg-white rounded-xl border-2 border-slate-200 shadow-inner hidden">
            <h3 class="text-xl font-bold mb-4 text-slate-800 border-b pb-2">สรุปผลการคำนวณ</h3>
            <div id="resultDetails" class="space-y-3 text-sm text-slate-600"></div>
            <button onclick="window.print()" class="no-print w-full mt-4 bg-slate-100 hover:bg-slate-200 py-2 rounded text-slate-600 font-semibold">พิมพ์รายงาน</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                if(localStorage.getItem(input.id)) {
                    input.value = localStorage.getItem(input.id);
                }
            });
            calcStock();
        };

        function saveData(el) { localStorage.setItem(el.id, el.value); }

        function formatInput(el) {
            let val = el.value.replace(/,/g, '');
            if (!isNaN(val) && val !== '') { el.value = parseFloat(val).toLocaleString('en-US'); }
        }
        function unformat(val) { return parseFloat(val.toString().replace(/,/g, '')) || 0; }

        function calcStock() {
            const qty = unformat(document.getElementById('stockQty').value);
            const buy = unformat(document.getElementById('stockBuy').value);
            const sell = unformat(document.getElementById('stockSell').value);
            const profit = Math.max(0, (sell - buy) * qty);
            document.getElementById('stockProfit').value = profit.toLocaleString(undefined, {maximumFractionDigits:2});
        }

        function autoCalcTax() {
            const divUSD = parseFloat(document.getElementById('divUSD').value) || 0;
            document.getElementById('taxPaidUSD').value = (divUSD * 0.15).toFixed(2);
            saveData(document.getElementById('taxPaidUSD'));
        }

        function calculate() {
            const salary = unformat(document.getElementById('salary').value);
            const freelance = unformat(document.getElementById('freelance').value);
            const fxRate = parseFloat(document.getElementById('fxRate').value) || 36.5;
            
            const stockProfitUSD = unformat(document.getElementById('stockProfit').value);
            const stockProfitTHB = stockProfitUSD * fxRate;
            
            const divUSD = parseFloat(document.getElementById('divUSD').value) || 0;
            const taxPaidUSD = parseFloat(document.getElementById('taxPaidUSD').value) || 0;
            const divTHB = divUSD * fxRate;
            const taxCreditTHB = taxPaidUSD * fxRate;

            const pvdRate = parseFloat(document.getElementById('pvd').value) || 0;
            const pvdAmount = salary * (pvdRate / 100);
            const sso = unformat(document.getElementById('sso').value);
            const parents = unformat(document.getElementById('parents').value);
            const others = unformat(document.getElementById('others').value);
            const personal = 60000;

            // --- ส่วนที่ปรับปรุง: รวมรายได้เพื่อหักค่าใช้จ่าย 50% ไม่เกิน 100,000 บาท ---
            const totalIncome = salary + freelance + stockProfitTHB + divTHB;
            const totalExpense = Math.min((salary + freelance) * 0.5, 100000); 
            const totalDeductions = personal + pvdAmount + sso + parents + others;
            
            // คำนวณเงินได้สุทธิ
            const netIncome = Math.max(0, totalIncome - totalExpense - totalDeductions);

            let tax = 0;
            const brackets = [150000, 300000, 500000, 750000, 1000000, 2000000, 5000000];
            const rates = [0, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35];
            
            let remaining = netIncome;
            remaining = Math.max(0, remaining - 150000); // ยกเว้น 150,000 บาทแรก
            for(let i=0; i<brackets.length; i++) {
                if(remaining <= 0) break;
                let limit = (i===0) ? brackets[0] : (brackets[i] - brackets[i-1]);
                let taxable = Math.min(remaining, limit);
                tax += taxable * rates[i+1];
                remaining -= taxable;
            }

            const finalTax = Math.max(0, tax - taxCreditTHB);

            // --- ส่วนที่ปรับปรุง: เพิ่มการแสดงผล "หักค่าใช้จ่าย" ในหน้าสรุปผล ---
            document.getElementById('output').classList.remove('hidden');
            document.getElementById('resultDetails').innerHTML = `
                <div class="space-y-1 border-b pb-4">
                    <div class="font-semibold text-slate-800">รายได้และค่าใช้จ่าย:</div>
                    <div class="flex justify-between text-xs"><span>เงินเดือน + Freelance:</span> <b>${(salary + freelance).toLocaleString(undefined, {maximumFractionDigits:0})}</b></div>
                    <div class="flex justify-between text-xs"><span>กำไรหุ้น (THB):</span> <b>${stockProfitTHB.toLocaleString(undefined, {maximumFractionDigits:0})}</b></div>
                    <div class="flex justify-between text-xs"><span>เงินปันผล (THB):</span> <b>${divTHB.toLocaleString(undefined, {maximumFractionDigits:0})}</b></div>
                    <div class="flex justify-between text-xs text-red-500 mt-2"><span>หักค่าใช้จ่าย (สูงสุด 100,000):</span> <b>-${totalExpense.toLocaleString(undefined, {maximumFractionDigits:0})}</b></div>
                </div>
                <div class="space-y-1 py-4 border-b">
                    <div class="font-semibold text-slate-800">รายละเอียดลดหย่อน:</div>
                    <div class="flex justify-between text-xs"><span>ส่วนตัว:</span> 60,000</div>
                    <div class="flex justify-between text-xs"><span>PVD:</span> ${pvdAmount.toLocaleString()}</div>
                    <div class="flex justify-between text-xs"><span>ประกันสังคม:</span> ${sso.toLocaleString()}</div>
                    <div class="flex justify-between text-xs"><span>ดูแลบิดามารดา:</span> ${parents.toLocaleString()}</div>
                    <div class="flex justify-between text-xs"><span>อื่น ๆ:</span> ${others.toLocaleString()}</div>
                    <div class="flex justify-between font-bold border-t mt-1 pt-1 text-slate-800"><span>รวมค่าลดหย่อน:</span> -${totalDeductions.toLocaleString()}</div>
                </div>
                <div class="space-y-2 pt-4">
                    <div class="flex justify-between"><span>เงินได้สุทธิ:</span> ${netIncome.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                    <div class="flex justify-between text-emerald-600"><span>เครดิตภาษีต่างประเทศ:</span> -${taxCreditTHB.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                    <div class="flex justify-between text-xl font-bold text-red-600 pt-2 border-t mt-2"><span>ภาษีที่ต้องจ่ายสุทธิ:</span> ${finalTax.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
