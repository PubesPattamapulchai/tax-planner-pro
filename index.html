<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บัญชีรายปี 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Sarabun', system-ui, sans-serif;
      --bg: #F0F4FF;
      --surface-0: #F0F4FF;
      --surface-1: #F8F9FF;
      --surface-2: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --fill-accent: #4F46E5;
      --bg-accent: #EEF2FF;
      --border-accent: #C7D2FE;
      --text-accent: #4338CA;
      --fill-success: #059669;
      --bg-success: #F0FDF4;
      --border-success: #A7F3D0;
      --text-success: #047857;
      --on-success: #FFFFFF;
      --fill-danger: #DC2626;
      --bg-danger: #FFF1F2;
      --border-danger: #FECDD3;
      --text-danger: #BE123C;
      --on-danger: #FFFFFF;
      --fill-warning: #D97706;
      --bg-warning: #FFFBEB;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F172A;
        --surface-0: #0F172A;
        --surface-1: #1E293B;
        --surface-2: #293548;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);
        --text-primary: #F1F5F9;
        --text-secondary: #94A3B8;
        --text-muted: #64748B;
        --fill-accent: #6366F1;
        --bg-accent: #1E1B4B;
        --border-accent: #3730A3;
        --text-accent: #818CF8;
        --fill-success: #10B981;
        --bg-success: #022C22;
        --border-success: #064E3B;
        --text-success: #34D399;
        --on-success: #022C22;
        --fill-danger: #EF4444;
        --bg-danger: #2D0A0A;
        --border-danger: #7F1D1D;
        --text-danger: #F87171;
        --on-danger: #2D0A0A;
        --fill-warning: #F59E0B;
        --bg-warning: #2D1700;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: var(--text-primary);
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      background: var(--surface-2);
      border: 0.5px solid var(--border-strong);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    /* ─── Header ─── */
    .hd {
      background: var(--surface-1);
      border-bottom: 0.5px solid var(--border);
      padding: 1.1rem 1.25rem;
    }
    .hd-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    #month-selector {
      width: 100%;
      padding: 9px 14px;
      background: var(--surface-2);
      border: 0.5px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      -webkit-appearance: none;
      appearance: none;
    }

    /* ─── Ring Hero ─── */
    .hero {
      padding: 1.4rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 0.5px solid var(--border);
    }
    .ring-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 1.1rem;
    }
    .ring-svg {
      width: 140px;
      height: 140px;
      transform: rotate(-90deg);
    }
    #ring-track { fill: none; stroke: var(--border-strong); stroke-width: 10; }
    #ring-arc {
      fill: none;
      stroke: var(--fill-accent);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.75s cubic-bezier(.4,0,.2,1), stroke 0.3s;
    }
    #ring-arc.warn { stroke: var(--fill-warning); }
    #ring-arc.over { stroke: var(--fill-danger); }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .ring-big {
      font-size: 30px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .ring-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      font-weight: 400;
    }

    /* ─── Stats ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }
    .sc { border-radius: 12px; padding: 11px 8px; text-align: center; }
    .sc.inc { background: var(--bg-success); border: 0.5px solid var(--border-success); }
    .sc.bal { background: var(--bg-accent);  border: 0.5px solid var(--border-accent);  }
    .sc.exp { background: var(--bg-danger);  border: 0.5px solid var(--border-danger);  }
    .sc-lbl { font-size: 11px; font-weight: 500; letter-spacing: .04em; margin-bottom: 4px; }
    .inc .sc-lbl { color: var(--text-success); }
    .bal .sc-lbl { color: var(--text-accent);  }
    .exp .sc-lbl { color: var(--text-danger);  }
    .sc-val { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inc .sc-val { color: var(--text-success); }
    .bal .sc-val { color: var(--text-accent);  }
    .exp .sc-val { color: var(--text-danger);  }

    /* ─── Budget Bar ─── */
    .bar-sec {
      padding: .8rem 1.25rem .6rem;
      border-bottom: 0.5px solid var(--border);
    }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    #budget-percent { color: var(--text-accent); font-weight: 700; }
    .prog-track {
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--fill-accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.65s cubic-bezier(.4,0,.2,1), background 0.3s;
    }

    /* ─── Form ─── */
    .form-sec { padding: .8rem 1.25rem .6rem; }
    #transaction-form {
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 13px;
    }
    .f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .finp {
      border: 0.5px solid var(--border-strong);
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 13px;
      width: 100%;
      font-family: var(--font);
      background: var(--surface-2);
      color: var(--text-primary);
      transition: border-color .15s, box-shadow .15s;
    }
    .finp:focus {
      outline: none;
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px var(--bg-accent);
    }
    .finp::placeholder { color: var(--text-muted); }
    .mb8 { margin-bottom: 8px; }
    .btn-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btx {
      border-radius: 10px;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      border: none;
    }
    .btx:active { transform: scale(.97); }
    .btx.inc-btn { background: var(--fill-success); color: #fff; }
    .btx.inc-btn:hover { opacity: .88; }
    .btx.exp-btn { background: var(--fill-danger); color: #fff; }
    .btx.exp-btn:hover { opacity: .88; }

    /* ─── List ─── */
    .list-sec { padding: .5rem 1.25rem .8rem; }
    .list-hd {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 9px;
    }
    #list {
      list-style: none;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .tx-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 11px;
      border-radius: 11px;
      margin-bottom: 6px;
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      transition: background .12s, border-color .12s;
    }
    .tx-row:last-child { margin-bottom: 0; }
    .tx-row:hover { background: var(--bg-accent); border-color: var(--border-accent); }
    .tx-info { flex: 1; min-width: 0; }
    .tx-top { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .tx-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-badge {
      font-size: 10px;
      background: var(--surface-0);
      border: 0.5px solid var(--border);
      color: var(--text-secondary);
      padding: 1px 7px;
      border-radius: 99px;
      font-weight: 400;
      flex-shrink: 0;
    }
    .tx-date { font-size: 10px; color: var(--text-muted); }
    .tx-side { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: 10px; }
    .tx-amt { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .tx-amt.inc { color: var(--text-success); }
    .tx-amt.exp { color: var(--text-danger); }
    .del-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 6px;
      transition: color .12s, background .12s;
      line-height: 1;
      font-family: sans-serif;
    }
    .del-btn:hover { color: var(--text-danger); background: var(--bg-danger); }
    .empty-li { text-align: center; padding: 2rem 0; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .empty-txt { font-size: 12px; color: var(--text-muted); font-weight: 400; }

    /* ─── Footer ─── */
    .foot-sec { padding: .5rem 1.25rem 1.1rem; border-top: 0.5px solid var(--border); }
    .foot-row { display: flex; gap: 8px; }
    .bfoot {
      flex: 1;
      border-radius: 10px;
      padding: 9px 0;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: 0.5px solid var(--border-strong);
      background: var(--surface-1);
      color: var(--text-secondary);
      transition: background .12s;
    }
    .bfoot:hover { background: var(--surface-0); }
    .bfoot.clear {
      border-color: var(--border-danger);
      color: var(--text-danger);
      background: var(--bg-danger);
    }
    .bfoot.clear:hover { background: var(--fill-danger); color: #fff; }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="hd">
      <div class="hd-title">📊 บัญชีรายปี 2026</div>
      <select id="month-selector" onchange="loadData()">
        <option value="0">มกราคม</option><option value="1">กุมภาพันธ์</option>
        <option value="2">มีนาคม</option><option value="3">เมษายน</option>
        <option value="4">พฤษภาคม</option><option value="5">มิถุนายน</option>
        <option value="6">กรกฎาคม</option><option value="7">สิงหาคม</option>
        <option value="8">กันยายน</option><option value="9">ตุลาคม</option>
        <option value="10">พฤศจิกายน</option><option value="11">ธันวาคม</option>
      </select>
    </header>

    <!-- Ring Hero + Stats -->
    <section class="hero">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
          <circle id="ring-track" cx="70" cy="70" r="56"/>
          <circle id="ring-arc" cx="70" cy="70" r="56"
            stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
        </svg>
        <div class="ring-center">
          <span class="ring-big" id="ring-pct-display">0%</span>
          <span class="ring-sub">งบที่ใช้</span>
        </div>
      </div>
      <div class="stats">
        <div class="sc inc"><div class="sc-lbl">รายรับ</div><div class="sc-val" id="stat-income">฿0</div></div>
        <div class="sc bal"><div class="sc-lbl">คงเหลือ</div><div class="sc-val" id="stat-balance">฿0</div></div>
        <div class="sc exp"><div class="sc-lbl">รายจ่าย</div><div class="sc-val" id="stat-expense">฿0</div></div>
      </div>
    </section>

    <!-- Budget Bar (original element) -->
    <div class="bar-sec">
      <div class="bar-meta">
        <span>การใช้งานงบประมาณ</span>
        <span id="budget-percent">0%</span>
      </div>
      <div class="prog-track">
        <div id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Form (all original IDs preserved) -->
    <div class="form-sec">
      <form id="transaction-form">
        <div class="f2">
          <input type="text" id="text" placeholder="รายการ (เช่น ข้าว)" required class="finp">
          <select id="category" class="finp">
            <option value="อาหาร">🍜 อาหาร</option>
            <option value="เดินทาง">🚗 เดินทาง</option>
            <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง</option>
            <option value="อื่นๆ">📦 อื่นๆ</option>
          </select>
        </div>
        <input type="number" id="amount" placeholder="จำนวนเงิน (บาท)" required class="finp mb8">
        <div class="btn-pair">
          <button type="button" onclick="addTransaction('income')" class="btx inc-btn">+ รับเงิน</button>
          <button type="button" onclick="addTransaction('expense')" class="btx exp-btn">− จ่ายเงิน</button>
        </div>
      </form>
    </div>

    <!-- Transaction List (original) -->
    <div class="list-sec">
      <div class="list-hd">รายการธุรกรรม</div>
      <ul id="list"></ul>
    </div>

    <!-- Footer (original) -->
    <div class="foot-sec">
      <div class="foot-row">
        <button onclick="exportData()" class="bfoot">💾 สำรองข้อมูล (JSON)</button>
        <button onclick="clearData()" class="bfoot clear">🗑 ล้างข้อมูลเดือนนี้</button>
      </div>
    </div>

  </div>

  <script>
    // r=56 → CIRC = 2π×56 = 351.86
    const CIRC = 2 * Math.PI * 56;
    const CAT_ICO = { 'อาหาร':'🍜','เดินทาง':'🚗','ช้อปปิ้ง':'🛍️','อื่นๆ':'📦' };

    const monthSelector = document.getElementById('month-selector');
    monthSelector.value = new Date().getMonth();

    function getStorageKey() { return `data_2026_${monthSelector.value}`; }

    function loadData() {
      const data = JSON.parse(localStorage.getItem(getStorageKey())) || { salary: 0, budget: 10000, transactions: [] };
      render(data);
    }

    function addTransaction(type) {
      const key = getStorageKey();
      let data = JSON.parse(localStorage.getItem(key)) || { salary: 0, budget: 10000, transactions: [] };
      data.transactions.push({
        text: document.getElementById('text').value,
        category: document.getElementById('category').value,
        amount: parseFloat(document.getElementById('amount').value),
        type,
        date: new Date().toLocaleDateString('th-TH')
      });
      localStorage.setItem(key, JSON.stringify(data));
      document.getElementById('text').value = '';
      document.getElementById('amount').value = '';
      loadData();
    }

    function deleteTransaction(index) {
      const key = getStorageKey();
      let data = JSON.parse(localStorage.getItem(key));
      data.transactions.splice(index, 1);
      localStorage.setItem(key, JSON.stringify(data));
      loadData();
    }

    function exportData() {
      const dataStr = localStorage.getItem(getStorageKey());
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `data_month_${monthSelector.value}.json`;
      a.click();
    }

    function clearData() {
      if (confirm('คุณต้องการลบข้อมูลทั้งหมดในเดือนนี้ใช่หรือไม่?')) {
        localStorage.removeItem(getStorageKey());
        loadData();
      }
    }

    function fmt(n) {
      const abs = Math.abs(n);
      return (n < 0 ? '-' : '') + '฿' + abs.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function render(data) {
      let totalIncome = 0, totalExpense = 0;
      data.transactions.forEach(t => {
        if (t.type === 'income') totalIncome += t.amount;
        else totalExpense += t.amount;
      });

      // Transaction list
      const list = document.getElementById('list');
      list.innerHTML = '';
      if (!data.transactions.length) {
        list.innerHTML = `<li class="empty-li">
          <span class="empty-icon">📭</span>
          <div class="empty-txt">ยังไม่มีรายการในเดือนนี้</div>
        </li>`;
      } else {
        data.transactions.forEach((t, i) => {
          const ico = CAT_ICO[t.category] || '📦';
          const amtStr = t.amount.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
          list.innerHTML += `<li class="tx-row">
            <div class="tx-info">
              <div class="tx-top">
                <span class="tx-name">${t.text}</span>
                <span class="tx-badge">${ico} ${t.category}</span>
              </div>
              <div class="tx-date">${t.date || ''}</div>
            </div>
            <div class="tx-side">
              <span class="tx-amt ${t.type === 'income' ? 'inc' : 'exp'}">
                ${t.type === 'income' ? '+' : '−'}฿${amtStr}
              </span>
              <button onclick="deleteTransaction(${i})" class="del-btn" aria-label="ลบ">✕</button>
            </div>
          </li>`;
        });
      }

      // Stats cards
      document.getElementById('stat-income').textContent  = fmt(totalIncome);
      document.getElementById('stat-expense').textContent = fmt(totalExpense);
      const bal = totalIncome - totalExpense;
      const balEl = document.getElementById('stat-balance');
      balEl.textContent = fmt(bal);
      balEl.style.color = bal < 0 ? 'var(--text-danger)' : 'var(--text-accent)';

      // Budget bar (original elements)
      const pct = data.budget > 0 ? (totalExpense / data.budget) * 100 : 0;
      const clamped = Math.min(pct, 100);
      document.getElementById('budget-percent').innerText = Math.round(pct) + '%';
      const pb = document.getElementById('progress-bar');
      pb.style.width = clamped + '%';
      pb.style.background = pct >= 90 ? 'var(--fill-danger)' : pct >= 70 ? 'var(--fill-warning)' : 'var(--fill-accent)';

      // Ring arc
      const arc = document.getElementById('ring-arc');
      arc.style.strokeDashoffset = CIRC * (1 - clamped / 100);
      document.getElementById('ring-pct-display').textContent = Math.round(pct) + '%';
      arc.classList.remove('warn', 'over');
      if (pct >= 90) arc.classList.add('over');
      else if (pct >= 70) arc.classList.add('warn');
    }

    loadData();
  </script>
</body>
</html>
